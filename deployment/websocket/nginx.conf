upstream afribox_app {
    server 127.0.0.1:8001;
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 4G;

    # -----------------------------
    # CAPTIVE PORTAL DETECTION
    # -----------------------------

    # Android
    location /generate_204 {
        return 302 http://192.168.12.1;
    }

    location /gen_204 {
        return 302 http://192.168.12.1;
    }

    # Apple
    location /hotspot-detect.html {
        return 302 http://192.168.12.1;
    }

    # Windows
    location /connecttest.txt {
        return 302 http://192.168.12.1;
    }

    location /ncsi.txt {
        return 302 http://192.168.12.1;
    }

    # -----------------------------
    # LOCAL DOMAIN ROUTING
    # -----------------------------

    if ($host = lr.afribox.local) {
        set $is_local 1;
    }

    # -----------------------------
    # MAIN ROUTING
    # -----------------------------

    location / {

        # If user is accessing local domain → go to app
        if ($host = lr.afribox.local) {
            proxy_pass http://afribox_app;
            break;
        }

        # Otherwise → show captive portal
        root /var/www/html;
        index index.html;
    }

    # -----------------------------
    # DJANGO (FOR LOCAL DOMAIN)
    # -----------------------------

    location @django {
        proxy_pass http://afribox_app;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # -----------------------------
    # STATIC FILES
    # -----------------------------

    location /staticfiles/ {
        root /afribox/elearncore;
    }

    location /assets/ {
        root /afribox/elearncore;
    }
}